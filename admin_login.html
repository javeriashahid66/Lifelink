<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLink — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --red: #C0001A; --dark: #1A0A0A; --grey: #6B5B5B; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0D0000; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 24px; padding: 50px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--dark); text-align: center; margin-bottom: 8px; }
    .logo span { color: var(--red); }
    .subtitle { text-align: center; color: var(--grey); font-size: 14px; margin-bottom: 36px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--grey); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 20px; border: 2px solid rgba(192,0,26,0.15); border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; }
    .form-group input:focus { border-color: var(--red); }
    .login-btn { width: 100%; background: var(--red); color: white; padding: 16px; border-radius: 50px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 10px; }
    .error { background: rgba(192,0,26,0.08); border: 2px solid rgba(192,0,26,0.3); color: var(--red); padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; text-align: center; }
    .back { text-align: center; margin-top: 20px; }
    .back a { color: var(--grey); font-size: 14px; text-decoration: none; }
    .back a:hover { color: var(--red); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Life<span>Link</span></div>
    <p class="subtitle">🔐 Admin Panel</p>

    {% if error %}
    <div class="error">❌ {{ error }}</div>
    {% endif %}

    <form action="/admin" method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="login-btn">Login →</button>
    </form>
    <div class="back"><a href="/">← Back to Home</a></div>
  </div>
</body>
</html>
